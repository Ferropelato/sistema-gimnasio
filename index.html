<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c41e1e">
  <link rel="manifest" href="/manifest.json">
  <title>Center Gym - Sistema de Gestión</title>
  <link rel="icon" type="image/png" href="/logo-center-gym.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="auth-gate" class="auth-gate">
    <div class="auth-gate-card">
      <img src="/logo-center-gym.png" alt="" class="auth-gate-logo" width="72" height="72">
      <h1 class="auth-gate-title">Center Gym</h1>
      <p class="auth-gate-sub">Iniciá sesión para acceder a los datos</p>
      <form id="form-auth-login" class="auth-gate-form">
        <div class="form-group">
          <label for="auth-email">Email</label>
          <input type="email" id="auth-email" name="email" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="auth-password">Contraseña</label>
          <input type="password" id="auth-password" name="password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary auth-gate-submit">Entrar</button>
      </form>
      <p id="auth-error" class="auth-error" role="alert"></p>
    </div>
  </div>

  <div id="app" hidden>
    <header class="header">
      <div class="header-logo">
        <img src="/logo-center-gym.png" alt="Center Gym" class="logo-img">
        <div>
          <h1>Sistema de Gestión</h1>
          <span id="header-fecha" class="header-fecha"></span>
        </div>
      </div>
      <nav class="nav">
        <button type="button" id="btn-auth-logout" class="btn btn-secondary" title="Cerrar sesión Firebase">Salir</button>
        <button id="btn-guardar" class="btn btn-secondary" title="Guardar datos manualmente">💾 Guardar</button>
        <button id="btn-exportar" class="btn btn-secondary" title="Descargar copia de seguridad">📤 Exportar</button>
        <button id="btn-importar" class="btn btn-secondary" title="Restaurar desde archivo">📥 Importar</button>
        <button class="nav-btn active" data-page="dashboard">Inicio</button>
        <button class="nav-btn" data-page="socios">Socios</button>
        <button class="nav-btn" data-page="cuotas">Cuotas</button>
        <button class="nav-btn" data-page="ventas">Ventas</button>
        <button class="nav-btn" data-page="stock">Stock</button>
        <button class="nav-btn" data-page="actividades">Actividades</button>
        <button class="nav-btn" data-page="horarios">Horarios</button>
        <button class="nav-btn" data-page="rutinas">Rutinas</button>
        <button class="nav-btn" data-page="acceso">Acceso Huella</button>
        <button class="nav-btn" data-page="admin">🔒 Administración</button>
      </nav>
    </header>

    <div id="sync-bar" class="sync-bar sync-bar--loading" role="status" aria-live="polite">
      Cargando estado de sincronización…
    </div>

    <main class="main">
      <div id="page-content"></div>
    </main>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
